<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Session Transcripts</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      height: 100vh;
      background: #f5f5f5;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      background: white;
      border-right: 1px solid #ddd;
    }

    #sidebar header {
      padding: 16px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #sidebar h1 { font-size: 15px; font-weight: 600; }

    #refresh-btn {
      font-size: 12px;
      padding: 4px 10px;
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
    }

    #refresh-btn:hover { background: #e0e0e0; }

    #session-list { flex: 1; overflow-y: auto; }

    .session-item {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
    }

    .session-item:hover { background: #f5f5f5; }
    .session-item.active { background: #e8f0fe; }

    .session-id {
      font-family: monospace;
      font-size: 12px;
      color: #333;
      margin-bottom: 3px;
    }

    .session-meta { font-size: 11px; color: #888; }

    /* ── Transcript panel ── */
    #transcript {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #transcript-header {
      padding: 14px 20px;
      background: white;
      border-bottom: 1px solid #ddd;
      font-size: 12px;
      color: #666;
      font-family: monospace;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 14px;
    }

    .msg-row { display: flex; flex-direction: column; }
    .msg-row.user { align-items: flex-end; }
    .msg-row.assistant { align-items: flex-start; }

    .bubble {
      max-width: 680px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.user .bubble {
      background: #007bff;
      color: white;
    }

    .msg-row.assistant .bubble {
      background: white;
      border: 1px solid #ddd;
      color: #111;
    }

    .msg-time {
      font-size: 10px;
      color: #aaa;
      margin-top: 4px;
      padding: 0 2px;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <header>
    <h1>Sessions</h1>
    <button id="refresh-btn" onclick="loadSessions()">Refresh</button>
  </header>
  <div id="session-list"></div>
</div>

<div id="transcript">
  <div id="empty-state">Select a session to view its transcript</div>
</div>

<script>
  const BASE = window.location.origin;

  async function loadSessions() {
    const list = document.getElementById('session-list');
    list.innerHTML = '<div style="padding:16px;font-size:13px;color:#999">Loading…</div>';

    const res = await fetch(`${BASE}/admin/sessions`);
    const sessions = await res.json();

    list.innerHTML = '';

    if (!sessions.length) {
      list.innerHTML = '<div style="padding:16px;font-size:13px;color:#999">No sessions yet</div>';
      return;
    }

    sessions.forEach(s => {
      const el = document.createElement('div');
      el.className = 'session-item';
      el.dataset.id = s.sessionId;
      const label = s.userIdentifier || `${s.sessionId.slice(0, 8)}&hellip;${s.sessionId.slice(-4)}`;
      el.innerHTML = `
        <div class="session-id">${label}</div>
        <div class="session-meta">${s.messageCount} messages &middot; ${s.lastActivity}</div>
      `;
      el.addEventListener('click', () => {
        document.querySelectorAll('.session-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        loadTranscript(s.sessionId, s.messageCount, s.userIdentifier);
      });
      list.appendChild(el);
    });
  }

  async function loadTranscript(sessionId, messageCount, userIdentifier) {
    const panel = document.getElementById('transcript');
    panel.innerHTML = '<div style="padding:20px;font-size:13px;color:#999">Loading…</div>';

    const res = await fetch(`${BASE}/admin/transcript/${sessionId}`);
    const messages = await res.json();

    const visible = messages.filter(m => m.content !== '__START__');

    const headerLabel = userIdentifier
      ? `${escapeHtml(userIdentifier)} &nbsp;·&nbsp; ${sessionId}`
      : sessionId;

    panel.innerHTML = `
      <div id="transcript-header">
        ${headerLabel} &nbsp;·&nbsp; ${messageCount} messages
      </div>
      <div id="messages">
        ${visible.map(m => `
          <div class="msg-row ${m.role}">
            <div class="bubble">${escapeHtml(m.content)}</div>
            <div class="msg-time">
              ${m.timestamp_display ?? ''}${m.input_tokens != null ? ` &nbsp;·&nbsp; ${m.input_tokens} in / ${m.output_tokens} out` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    `;

    panel.querySelector('#messages').scrollTop = 0;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  loadSessions();
</script>
</body>
</html>
